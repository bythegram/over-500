<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Over 500">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <!-- theme-color matches the --color-brand-bg fallback (#134a8e) in style.css -->
  <meta name="theme-color" content="#134a8e">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="fonts/stylesheet.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <title>Over 500</title>
</head>
<body>
  <main>
    <div class="headbar">
      <button id="team-btn" type="button" aria-label="Load random team"></button>
    </div>
    <div class="winper">
      <div class="vert_wrapper">
        <div class="vert_cell">
          <div id="win-pct"></div>
        </div>
      </div>
    </div>
    <div class="moredetails" id="more-details" role="button" tabindex="0"
         aria-label="Open full season stats" aria-controls="stats-drawer" aria-expanded="false"></div>
  </main>

  <!-- Stats Drawer -->
  <div class="drawer-backdrop" id="drawer-backdrop" hidden aria-hidden="true"></div>
  <div class="drawer" id="stats-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title"
       hidden>
    <div class="drawer-header">
      <h2 id="drawer-title">Full Season Stats</h2>
      <button class="drawer-close" id="drawer-close" type="button" aria-label="Close stats drawer"></button>
    </div>
    <div class="drawer-content">
      <table class="stats-table">
        <tbody id="stats-table-body">
          <!-- Populated by JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
